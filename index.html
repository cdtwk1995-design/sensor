<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Supabase 기반 실시간 센서 모니터링 대시보드 PWA" />
    <title>실시간 센서 모니터링</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="icons/icon-192.png" />
    <meta name="theme-color" content="#0f1117" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <!-- Header -->
    <header class="header" id="app-header">
        <div class="header-inner">
            <div class="header-title">
                <span class="header-icon">📡</span>
                <h1>실시간 센서 모니터링</h1>
            </div>
            <div class="header-status">
                <span class="status-dot" id="status-dot"></span>
                <span class="status-text" id="status-text">연결 중...</span>
                <span class="header-time" id="header-time"></span>
            </div>
        </div>
    </header>

    <!-- Stats Bar -->
    <section class="stats-bar" id="stats-bar" aria-label="통계">
        <div class="stat-item">
            <span class="stat-label">전체</span>
            <span class="stat-value" id="stat-total">0</span>
        </div>
        <div class="stat-item warning-stat">
            <span class="stat-label">⚠️ 경고</span>
            <span class="stat-value" id="stat-warning">0</span>
        </div>
        <div class="stat-item risk-stat">
            <span class="stat-label">🚨 위험</span>
            <span class="stat-value" id="stat-risk">0</span>
        </div>
    </section>

    <!-- Main Grid -->
    <main class="dashboard" id="dashboard">

        <!-- All Logs -->
        <section class="panel panel-all" id="panel-all" aria-label="전체 로그">
            <div class="panel-header">
                <div class="panel-title-row">
                    <span class="panel-icon">📋</span>
                    <h2 class="panel-title">전체 로그</h2>
                </div>
                <span class="panel-badge badge-all" id="badge-all">0</span>
            </div>
            <div class="card-list" id="list-all"></div>
        </section>

        <!-- Warning -->
        <section class="panel panel-warning" id="panel-warning" aria-label="경고">
            <div class="panel-header">
                <div class="panel-title-row">
                    <span class="panel-icon">⚠️</span>
                    <h2 class="panel-title">경고 (Level 1)</h2>
                </div>
                <span class="panel-badge badge-warning" id="badge-warning">0</span>
            </div>
            <div class="card-list" id="list-warning"></div>
        </section>

        <!-- Risk -->
        <section class="panel panel-risk" id="panel-risk" aria-label="위험">
            <div class="panel-header">
                <div class="panel-title-row">
                    <span class="panel-icon">🚨</span>
                    <h2 class="panel-title">위험 (Level 2)</h2>
                </div>
                <span class="panel-badge badge-risk" id="badge-risk">0</span>
            </div>
            <div class="card-list" id="list-risk"></div>
        </section>

    </main>

    <!-- Supabase Realtime SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="app.js"></script>
</body>

</html>
